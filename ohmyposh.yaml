# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
upgrade:
  source: cdn
  interval: 168h
  auto: false
  notice: false
console_title_template: "{{ .Shell }} in {{ .Folder }}"
version: 4
final_space: true

transient_prompt:
  background: transparent
  foreground_templates:
    - "{{ if eq .Code 0 }}magenta{{else}}red{{end}}"
  template: "❯"

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: session
        style: plain
        foreground: "yellow"
        background: "transparent"
        template: "{{ if .SSHSession }}{{ .UserName }}@{{ .HostName}} {{ end }}"
      - type: path
        style: plain
        foreground: "blue"
        background: "transparent"
        template: "{{ .Path }}"
        options:
          style: full
      - type: git
        style: plain
        foreground: "green"
        background: "transparent"
        foreground_templates:
          - "{{ if ne .BranchStatus '≡' }}red{{end}}"
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}red{{ end }}"
        template: "({{ .HEAD }})"
        options:
          branch_icon: ""
          fetch_status: true
          fetch_upstream_icon: true
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground_templates:
          - "{{ if eq .Code 0 }}magenta{{else}}red{{end}}"
        background: "transparent"
        template: "❯"
